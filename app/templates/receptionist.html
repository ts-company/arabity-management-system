<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>صفحة مركز الاستقبال</title>
    <style>
body {
    background-color: #000000;
    color: #ffffff;
    font-family: Arial, sans-serif;
    margin: 0;
    font-size: 16px;
}
.container {
    max-width: 1600px;
    margin: auto;
    padding: 20px;
}
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
header a { color: #ffffff; text-decoration: none; }
header a:hover { color: #fff; }

.form-section, .table-section {
    background-color: #000000;
    border: 2px solid rgba(0, 0, 0, 0.6);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 20px;
    overflow-x: auto;
}
.form-section h2, .table-section h2 {
    font-size: 22px;
    font-weight: bold;
    margin-top: 0;
    margin-bottom: 15px;
}
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
    gap: 10px;
}
input {
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    background: #444444;
    color: #ffffff;
    font-size: 15px;
}
button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background-color: #888888 !important;
    color: #000 !important;
    font-size: 14px;
}
button.add { background-color: #888888 !important; color: #000 !important; }
button.delete { background-color: #888888 !important; color: #000 !important; }

table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 12px;
    border-bottom: 1px solid rgba(100,100,120,0.5);
    text-align: right;
    font-size: 14px;
}
tr:hover { background-color: rgba(100,100,150,0.2); }

.error { color: #f87171; margin-bottom: 10px; }
</style>
</head>

    <script>

// future_customers

let future_customers = [];

async function load_future_customers() {
    const tbody = document.getElementById("future_customers");
    tbody.innerHTML = "";
    const res = await fetch("http://localhost:8000/customers/get_future_customers", { credentials:"include" });
    future_customers = await res.json();
    render_future_customers(future_customers);
}

function render_future_customers(customers) {
    const tbody = document.getElementById("future_customers");
    tbody.innerHTML = "";

    customers.forEach(customer => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${customer.id}</td>
            <td>${customer.customer_name || "-"}</td>
            <td>${customer.customer_phone_number || "-"}</td>
            <td>${customer.was_called || "-"}</td>
            <td>
                <button onclick="customerCalled(${customer.id})">تم</button>
            </td>
        `;
        tbody.appendChild(tr);

    });
}

async function customerCalled(id) {
    const res = await fetch(`http://localhost:8000/customers/future_customer_called/${id}`, {
        method: "PATCH",
        credentials: "include"
    });
    load_future_customers();
}
