<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>الاستمارات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header a {
            color: #e5e7eb;
            text-decoration: none;
        }

        header a:hover {
            color: #ffffff;
        }

        .form-section,
        .table-section {
            background-color: #000000;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            border-left: 1px solid #d4af37;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        input,
        button {
            padding: 6px 8px;
            border-radius: 8px;
            border: none;
            background: #444444;
            color: #ffffff;
        }

        button {
            cursor: pointer;
            font-weight: bold;
            background-color: #888888;
            color: #000;
        }

        button:hover {
            background-color: #aaaaaa;
        }

        button.accept {
            background-color: #888888;
            color: #000;
        }

        button.delete {
            background-color: #888888;
            color: #000;
        }

        .approve-btn {
            background-color: #888888;
            color: #000;
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 6px;
            border-bottom: 1px solid rgba(100, 100, 120, 0.5);
            text-align: right;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .error {
            color: #f87171;
            margin-bottom: 10px;
        }

        tr.approved {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .form-section,
            .table-section {
                padding: 10px;
                margin-bottom: 10px;
            }
            
            input {
                width: 100%;
            }
            
            th, td {
                padding: 4px;
                font-size: 14px;
            }
            
            button {
                padding: 4px 6px;
                font-size: 14px;
            }
        }
    </style>

    <head>

    <body class="bg-black">
        <div>
            <div class="w-full max-w-2xl">
                <div class="grid grid-cols-3 gap-6">
                </div>
            </div>
            <div class="form-section">
                <h2>بحث</h2>
                <div>
                    <input id="phoneSearchInput" placeholder="ابحث برقم الهاتف">
                </div>
            </div>

            <div class="table-section">
                <h2>تمت الموافقة عليها</h2>
                <table>
                    <thead>
                        <tr>
                            <th>id</th>
                            <th>اسم العميل</th>
                            <th>رقم الهاتف</th>
                            <th>نوع السيارة</th>
                            <th>الموديل</th>
                            <th>اللون</th>
                            <th>رقم اللوحة المعدنية</th>
                        </tr>
                    </thead>
                    <tbody id="accepted_forms"></tbody>
                </table>
            </div>
</head>
<script>
    let all_accepted_forms = [];

    async function loadaccepted_forms() {
        const tbody = document.getElementById("accepted_forms");
        tbody.innerHTML = "";

        try {
            const res = await fetch("/sales/get_approved", {
                credentials: "include"
            });

            const data = await res.json();

            all_accepted_forms = [
                ...data.receiving,
                ...data.comparison,
                ...data.delivery,
                ...data.booking
            ];

            render_accepted_forms(all_accepted_forms);

        } catch (e) {
            alert("فشل التحميل");
        }
    }

    function render_accepted_forms(forms) {
        const tbody = document.getElementById("accepted_forms");
        tbody.innerHTML = "";

        forms.forEach(form => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td>${form.id}</td>
            <td>${form.customer_name || "-"}</td>
            <td>${form.customer_phone_number || "-"}</td>
            <td>${form.brand}</td>
            <td>${form.model}</td>
            <td>${form.color || "-"}</td>
            <td>${form.plate_number || "-"}</td>
            <td>${form.source || "-"}</td>
            <td>
                <button onclick="set_printed(${form.id}, '${form.source}')">PDF</button>
            </td>
        `;
            tbody.appendChild(tr);

        });
    }

    function openPdf(id, source) {
        let baseUrl = "";

        switch (source) {
            case "استلام":
                baseUrl = "/receiving/generate_pdf/";
                break;
            case "تسليم":
                baseUrl = "/delivery/generate_pdf/";
                break;
            case "مقايسة":
                baseUrl = "/comparison/generate_pdf/";
                break;
            case "حجز":
                baseUrl = "/booking/generate_pdf/";
                break;
            default:
                alert("مصدر غير معروف");
                return;
        }

        window.open(`${baseUrl}${id}`, "_blank");
    }


    async function set_printed(id, source) {

        openPdf(id, source);

        let baseUrl = "";
        switch (source) {
            case "استلام":
                baseUrl = "/receiving/printed/";
                break;
            case "تسليم":
                baseUrl = "/delivery/printed/";
                break;
            case "مقايسة":
                baseUrl = "/comparison/printed/";
                break;
            case "حجز":
                baseUrl = "/booking/printed/";
                break;
            default:
                alert("مصدر غير معروف");
                return;
        }

        try {
            const res = await fetch(`${baseUrl}${id}`, {
                method: "PATCH",
                credentials: "include"
            });

            if (!res.ok) {
                alert("فشل التحديث");
                return;
            }

            loadaccepted_forms();
        } catch (e) {
            alert(e.message);
        }
    }

    function applySearch() {
        const phoneQuery = document.getElementById("phoneSearchInput").value.toLowerCase();

        render_accepted_forms(
            all_accepted_forms.filter(f =>
                (f.customer_phone_number || "").toLowerCase().includes(phoneQuery)
            )
        );
    }

    document.getElementById("phoneSearchInput").addEventListener("input", applySearch);
    loadaccepted_forms();

</script>
