<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arabity Management System - Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background-color: #ffffff;
            width: 380px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            color: #203a43;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #203a43;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2c5364;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Arabity</h1>

        <form id="loginForm" method="POST" action="http://localhost:8000/login" enctype="application/x-www-form-urlencoded">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" id="username" required />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="password" required />
            </div>

            <button type="submit">Login</button>
            <div class="error" id="error">
                {% if request.query_params.get("error") %}
                    Invalid username or password
                {% endif %}
            </div>
        </form>
    </div>
    <script>
            window.addEventListener("DOMContentLoaded", () => {
            const url = new URL(window.location);
            if (url.searchParams.has("error")) {
                // Remove the error param from the URL without reloading
                url.searchParams.delete("error");
                window.history.replaceState({}, document.title, url.pathname);
            }
            });
    </script>
</body>
</html>
