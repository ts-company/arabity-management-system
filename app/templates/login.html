<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background-color: #0f172a; /* dark background */
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Login container */
.login-container {
    background-color: #000000; /* black card */
    width: 380px;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    border-left: 4px solid #1f2937; /* subtle dark gray accent instead of gold */
}

/* Title */
h1 {
    text-align: center;
    color: #f1f5f9; /* white text */
    margin-bottom: 30px;
    font-size: 24px;
}

/* Form group spacing */
.form-group {
    margin-bottom: 20px;
}

/* Labels */
label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #f1f5f9; /* white/gray labels */
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background-color: #1e1e2a; /* dark gray inputs */
    color: #f1f5f9; /* white text */
}

input:focus {
    outline: none;
    box-shadow: 0 0 0 2px #3b4252; /* subtle gray focus */
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background-color: #444444; /* gray button */
    color: #f1f5f9; /* white text */
    transition: 0.2s ease;
}

button:hover {
    background-color: #555555; /* slightly lighter gray on hover */
}

/* Error messages */
.error {
    color: #f87171; /* red for errors */
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Arabity</h1>

        <form id="loginForm" method="POST" action="/login" enctype="application/x-www-form-urlencoded">
            <div class="form-group">
                <label>Username</label>
                <input required type="text" name="username" id="username" required autocomplete="off"/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input required type="password" name="password" id="password" required autocomplete="off"/>
            </div>

            <button type="submit">Login</button>
            <div class="error" id="error">
                {% if request.query_params.get("error") %}
                    Invalid username or password
                {% endif %}
            </div>
        </form>
    </div>
    <script>
            window.addEventListener("DOMContentLoaded", () => {
            const url = new URL(window.location);
            if (url.searchParams.has("error")) {
                url.searchParams.delete("error");
                window.history.replaceState({}, document.title, url.pathname);
            }
            });
    </script>
</body>
</html>
