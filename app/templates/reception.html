<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>استمارة الاستلام</title>
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

    <style>
        body {
            background: #000000;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        form {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        input,
        select,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2f3a;
            background: #161b22;
            color: white;
        }

        button {
            grid-column: span 3;
            cursor: pointer;
            background: #2d2d2d;
            color: #e6e6e6;
            font-weight: bold;
            border: 1px solid #444;
        }

        button:hover {
            background: #3a3a3a;
        }

        h2 {
            grid-column: span 3;
            color: #9ca3af;
            margin-top: 20px;
        }

        /* Description checkbox UI */
        .description-box {
            grid-column: span 3;
            background: #161b22;
            border: 1px solid #2a2f3a;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .desc-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            background: #0e1117;
            border: 1px solid #2a2f3a;
            transition: background 0.2s, border 0.2s;
        }

        .desc-item:hover {
            background: #1f2633;
            border-color: #9ca3af;
        }

        .desc-item input {
            accent-color: #9ca3af;
        }

        .large-field {
            grid-column: span 3;
            min-height: 96px;
            padding: 10px;
            border-radius: 6px;
            resize: vertical;
            background: #0f1720;
            color: #e6e6e6;
            border: 1px solid #2a2f3a;
        }

        .category-box {
            grid-column: span 3;
            background: #161b22;
            border: 1px solid #2a2f3a;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            background: #0e1117;
            border: 1px solid #2a2f3a;
            transition: background 0.2s, border 0.2s;
        }

        .category-item:hover {
            background: #1f2633;
            border-color: #9ca3af;
        }

        .category-item input {
            accent-color: #9ca3af;
        }

        .ts-control {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2f3a;
            background: #161b22;
            color: black;
        }

        /* text inside */
        .ts-control input {
            color: black;
        }

        /* dropdown */
        .ts-dropdown {
            background: #161b22;
            border: 1px solid #2a2f3a;
            color: white;
        }

        /* dropdown items */
        .ts-dropdown .option {
            padding: 10px;
            color: white;
        }

        /* hover item */
        .ts-dropdown .option:hover {
            background: #2a2f3a;
        }

        /* selected item */
        .ts-dropdown .active {
            background: #2a2f3a;
        }

        /* placeholder */
        .ts-control input::placeholder {
            color: #9ca3af;
        }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<body>

    <h2>استلام سيارة</h2>

    <form id="receiveForm">

        <input name="day" id="day" placeholder="اليوم" readonly>
        <input type="date" name="current_date" id="date" readonly onfocus="this.blur()">
        <input name="customer_name" placeholder="اسم العميل" required autocomplete="off">

        <input type="time" name="receive_time" id="receive_time" readonly>
        <input name="customer_phone_number" placeholder="رقم الهاتف" required autocomplete="off">
        <input name="customer_email" placeholder="البريد الإلكتروني" required autocomplete="off">

        <select id="brandSelect" name="brand" required autocomplete="off">
            <option value="" disabled selected hidden>نوع السيارة</option>
            <option value="BMW">BMW</option>
            <option value="Mercedes-Benz">Mercedes-Benz</option>
            <option value="Toyota">Toyota</option>
            <option value="Volkswagen">Volkswagen</option>
            <option value="Hyundai">Hyundai</option>
            <option value="Nissan">Nissan</option>
            <option value="Kia">Kia</option>
            <option value="Chevrolet">Chevrolet</option>
            <option value="Ford">Ford</option>
            <option value="Honda">Honda</option>
            <option value="Audi">Audi</option>
            <option value="Tesla">Tesla</option>
            <option value="Lexus">Lexus</option>
            <option value="Mazda">Mazda</option>
            <option value="subaru">subaru</option>
            <option value="Jeep">Jeep</option>
            <option value="Porsche">Porsche</option>
            <option value="Volvo">Volvo</option>
            <option value="Land Rover">Land Rover</option>
            <option value="Jaguar">Jaguar</option>
            <option value="Peugeot">Peugeot</option>
            <option value="Renault">Renault</option>
            <option value="Fiat">Fiat</option>
            <option value="Skoda">Skoda</option>
            <option value="SEAT">SEAT</option>
            <option value="Mini">Mini</option>
            <option value="Dodge">Dodge</option>
            <option value="BYD">BYD</option>
            <option value="Mitsubishi">Mitsubishi</option>
            <option value="Geely">Geely</option>
            <option value="Ferrari">Ferrari</option>
            <option value="Lamborghini">Lamborghini</option>
            <option value="other">اخرى</option>
        </select>
        <input name="model" placeholder="الموديل" required autocomplete="off">
        <input name="color" placeholder="اللون" required autocomplete="off">

        <input name="chassis_number" placeholder="رقم الشاسيه" required autocomplete="off">
        <input name="plate_number" placeholder="رقم اللوحة المعدنية" required autocomplete="off">
        <input name="mileage" placeholder="العداد" required autocomplete="off">

        <h2>البند</h2>

        <div class="category-box">

            <label class="category-item">
                <input type="checkbox" name="category" value="رش و سمكرة">
                رش و سمكرة
            </label>

            <label class="category-item">
                <input type="checkbox" name="category" value="protection">
                protection
            </label>

            <label class="category-item">
                <input type="checkbox" name="category" value="قطع الغيار">
                قطع الغيار
            </label>

            <label class="category-item">
                <input type="checkbox" name="category" value="أعمال زرجينه">
                أعمال زرجينه
            </label>

            <label class="category-item">
                <input type="checkbox" name="category" value="أعمال عفشة">
                أعمال عفشة
            </label>

            <label class="category-item">
                <input type="checkbox" name="category" value="أعمال ماتور">
                أعمال ماتور
            </label>

            <label class="category-item">
                <input type="checkbox" name="category" value="أعمال كهرباء">
                أعمال كهرباء
            </label>

            <label class="category-item">
                <input type="checkbox" name="category" value="spot repair">
                spot repair
            </label>

        </div>

        <h2>الوصف</h2>
        <div class="description-box">
            <input type="hidden" name="fix_description" id="descriptionsField">
        </div>

        <h2>السعر</h2>

        <select class="price-select" id="paintSelect" data-category="paint">
            <option value="" disabled selected hidden>رش و سمكرة</option>
        </select>

        <select class="price-select" id="spotSelect" data-category="spot_repair">
            <option value="" disabled selected hidden>Spot repair</option>
        </select>

        <select class="price-select" id="protectionSelect" data-category="protection">
            <option value="" disabled selected hidden>Protction</option>
        </select>

        <select class="price-select" data-category="belt">
            <option value="" disabled selected hidden>حزام</option>
        </select>

        <select class="price-select" data-category="complete_car">
            <option value="" disabled selected hidden>سيارة كاملة</option>
        </select>

        <input name="total_price" id="price" placeholder="السعر الاجمالي" readonly>

        <input name="total_paid" id="paid_amount" type="number" step="0.01" placeholder="المبلغ المدفوع" required
            autocomplete="off">
        <input name="remains" id="remaining" placeholder="المبلغ المتبقي" readonly>

        <input name="notes" id="selected_prices" class="large-field" placeholder="ملاحظات" required autocomplete="off">

        <button type="submit">Submit</button>
    </form>

    <script>
        new TomSelect("#brandSelect", {
            create: false,
            sortField: {
                field: "text",
                direction: "asc"
            },
            placeholder: "ابحث عن نوع السيارة"
        });
        function calculateTotalPrice() {
            const selects = document.querySelectorAll(".price-select");
            let total = 0;

            selects.forEach(select => {
                const value = parseFloat(select.value);
                if (!isNaN(value)) {
                    total += value;
                }
            });

            document.getElementById("price").value = total;
        }
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll(".price-select").forEach(select => {
                select.addEventListener("change", calculateTotalPrice);
            });
        });

        const priceInput = document.getElementById("price");
        const priceSelects = document.querySelectorAll(".price-select");

        function updateRemaining() {
            const total = priceInput.value;
            const paidEl = document.getElementById('paid_amount');
            const remainingEl = document.getElementById('remaining');
            if (!remainingEl || !paidEl) return;
            const paid = Number(paidEl.value) || 0;
            if (Number.isNaN(total)) {
                remainingEl.value = '';
                remainingEl.placeholder = 'السعر غير محدد';
                return;
            }
            let rem = total - paid;
            if (rem < 0) rem = 0;
            remainingEl.value = rem;
        }

        // react to price changes and paid amount input
        priceSelects.forEach(s => s.addEventListener('change', updateRemaining));
        document.getElementById('paid_amount').addEventListener('input', updateRemaining);

        // ensure remaining is set on initial load if price is prefilled
        updateRemaining();

        function setLocalDayAndDate() {
            const now = new Date();

            // fix timezone offset to get local date
            const offset = now.getTimezoneOffset() * 60000; // in ms
            const localNow = new Date(now.getTime() - offset);
            const localISO = localNow.toISOString().slice(0, 10); // "YYYY-MM-DD"

            const dayNames = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const dayEl = document.getElementById('day');
            const dateEl = document.getElementById('date');

            if (dayEl) dayEl.value = dayNames[now.getDay()]; // day name for current local date
            if (dateEl) dateEl.value = localISO;

            // Update day name if user manually changes the date
            if (dateEl) {
                dateEl.addEventListener('change', () => {
                    const d = new Date(dateEl.value);
                    if (!isNaN(d)) {
                        if (dayEl) dayEl.value = dayNames[d.getDay()];
                    }
                });
            }
        }

        setLocalDayAndDate();

        document.getElementById("receiveForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);

            const selectedCategories = formData.getAll("category");

            if (selectedCategories.length === 0) {
                alert("يجب اختيار بند واحد على الأقل");
                return;
            }


            const selectedDescriptions = Array.from(
                document.querySelectorAll(".description-checkbox:checked")
            ).map(cb => cb.value);

            formData.set("fix_description", selectedDescriptions.join(", "));

            priceSelects.forEach((select, index) => {
                if (select.value) {
                    formData.append(`price_category_${index + 1}`, select.value);
                }
            });

            const res = await fetch("http://localhost:8000/receiving/save_form", {
                method: "POST",
                body: formData,
                credentials: "include"
            });

            if (!res.ok) {
                alert("فشل الحفظ");
                return;
            }

            alert("تم الحفظ بنجاح");
        });

        async function loadPricesIntoSelects() {
            try {
                const res = await fetch("http://localhost:8000/prices/get_prices", {
                    credentials: "include"
                });

                if (!res.ok) throw new Error("Failed to load prices");

                const prices = await res.json();

                const selects = document.querySelectorAll(".price-select");

                selects.forEach(select => {
                    const placeholder = select.querySelector("option[disabled]");
                    select.innerHTML = "";
                    if (placeholder) select.appendChild(placeholder);
                });

                prices.forEach(price => {
                    const select = document.querySelector(
                        `.price-select[data-category="${price.category}"]`
                    );

                    if (!select) return;

                    const option = document.createElement("option");
                    option.value = price.price;
                    option.textContent = `${price.name} - ${price.price}`;
                    option.dataset.id = price.id;

                    select.appendChild(option);
                });

            } catch (err) {
                console.error(err);
            }
        }

        async function loadDescriptions() {
            try {
                const res = await fetch("http://localhost:8000/prices/get_descriptions", {
                    credentials: "include"
                });

                if (!res.ok) throw new Error("Failed to load descriptions");

                const descriptions = await res.json();
                const box = document.querySelector(".description-box");

                // keep the hidden input, remove everything else
                const hiddenInput = document.getElementById("descriptionsField");
                box.innerHTML = "";
                box.appendChild(hiddenInput);

                descriptions.forEach(desc => {
                    const label = document.createElement("label");
                    label.style.display = "flex";
                    label.style.alignItems = "center";
                    label.style.gap = "6px";

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.value = desc.name;
                    checkbox.classList.add("description-checkbox");

                    const text = document.createElement("span");
                    text.textContent = desc.name;

                    label.appendChild(checkbox);
                    label.appendChild(text);
                    box.appendChild(label);
                });

            } catch (err) {
                console.error(err);
            }
        }

        const now = new Date();
        const time = now.toTimeString().slice(0, 5); // HH:MM
        document.getElementById("receive_time").value = time;

        loadDescriptions();
        loadPricesIntoSelects();
    </script>

</body>

</html>
