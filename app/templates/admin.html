<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Car Management</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #0e1117;
            color: #e6e6e6;
        }

        header {
            background-color: #161b22;
            padding: 20px 40px;
            border-bottom: 1px solid #2a2f3a;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            color: #58a6ff;
        }

        main {
            padding: 40px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: #161b22;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #2a2f3a;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #ffffff;
        }

        .card p {
            font-size: 14px;
            color: #9da5b4;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <header>
        <h1>Admin Dashboard</h1>
    </header>

    <main>
        <div class="dashboard-grid">
            <div class="card" onclick="window.location.href='http://localhost:8000/employees'">
                <h2>Manage Employees</h2>
                <p>Add, edit, and manage staff accounts</p>
            </div>

            <div class="card" onclick="window.location.href='http://localhost:8000/cars'">
                <h2>Manage Cars</h2>
                <p>Create, update, and remove car records</p>
            </div>

            <div class="card" onclick="window.location.href='http://localhost:8000/receive'"">
                <h2>Receiving Car</h2>
                <p>Register incoming vehicles</p>
            </div>

            <div class="card" onclick="window.location.href='http://localhost:8000/delivery'">
                <h2>Delivering Car</h2>
                <p>Finalize vehicle handovers</p>
            </div>

            <div class="card" onclick="window.location.href='http://localhost:8000/comparison'">
                <h2>Car Comparison</h2>
                <p>Compare vehicle specs and pricing</p>
            </div>
        </div>
    </main>

    <footer>
        © 2026 Arabity Management System
    </footer>

    <script>
        function goTo(url) {
            const token = localStorage.getItem("access_token");
            fetch(url, {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            })
            .then(res => {
                if (!res.ok) throw new Error("Failed to load page");
                return res.text();
            })
            .then(html => {
                document.open();
                document.write(html);
                document.close();
            })
            .catch(err => {
                console.error(err);
                alert("Failed to load page. Please try again.");
                window.location.href = "/login.html";
            });
        }   
    </script>
</body>
</html>
