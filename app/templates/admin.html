<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            background-color: #0e1117;
            color: #e6e6e6;
            height: 100vh;
            overflow: hidden;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            /* slightly taller navbar */
            background-color: #000000;
            /* fully black */
            border-bottom: 1px solid #2a2f3a;
            display: flex;
            align-items: center;
            padding: 0 40px;
            /* wider padding */
            gap: 20px;
            z-index: 1000;
        }

        /* Logo */
        .logo {
            height: 50px;
            /* adjust as needed */
            width: auto;
            object-fit: contain;
            margin-right: 30px;
        }

        .nav-btn {
            background: none;
            border: 1px solid #2a2f3a;
            color: #e6e6e6;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background-color: #21262d;
        }

        /* CONTENT */
        main {
            position: absolute;
            top: 80px;
            /* match new navbar height */
            bottom: 0;
            left: 0;
            right: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #0e1117;
        }

        .vip-btn {
            border: 2px solid #d4af37;
        }
    </style>
</head>

<body>

    <nav>
        <img src="/static/assets/logo.jpeg" alt="Company Logo" class="logo" />

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/reports')">
            التقارير
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/employees')">
            الموظفون
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/salary')">
            المرتبات
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/receiving/forms_page')">
            الاستلامات
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/comparison/get_page')">
            المقايسات
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/delivery/get_page')">
            التسليمات
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/booking/show_bookings_page')">
            الحجوزات
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/appointment/show_appointments')">
            المواعيد
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/prices')">
            الأسعار
        </button>

        <button class="nav-btn" onclick="loadPage('http://localhost:8000/customers')">
            العملاء
        </button>

        <!-- <button class="nav-btn" onclick="loadPage('http://localhost:8000/send_whatsapp')">
            رسائل
        </button> -->

        <button class="nav-btn vip-btn" onclick="loadPage('http://localhost:8000/vip')">
            VIP
        </button>

        <button class="nav-btn" onclick="logout()">
            تسجيل الخروج
        </button>
    </nav>

    <main>
        <iframe id="contentFrame" src="http://localhost:8000/reports"></iframe>
    </main>

    <script>
        function loadPage(url) {
            document.getElementById("contentFrame").src = url;
        }

        async function logout() {
            try {
                await fetch("http://localhost:8000/logout", {
                    method: "POST",
                    credentials: "include"
                });

                window.location.href = "http://localhost:8000";
            } catch (e) {
                alert("Logout failed");
            }
        }
    </script>

</body>

</html>
