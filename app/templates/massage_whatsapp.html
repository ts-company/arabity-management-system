<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال واتساب</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        /* subtle background glow */
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.06), transparent 70%);
            top: -150px;
            right: -150px;
            filter: blur(60px);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px;

            background: rgba(10, 10, 10, 0.9);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 600;
        }

        .header p {
            margin-top: 6px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;

            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.08);

            color: #fff;
            resize: none;
            outline: none;

            transition: 0.2s;
        }

        textarea:focus {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            background: grey;
            color: #000;

            font-weight: 600;
            font-size: 15px;
            cursor: pointer;

            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
                align-items: flex-start;
            }

            .container {
                margin-top: 40px;
                padding: 22px;
            }

            .header h1 {
                font-size: 20px;
            }

            button {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>إرسال رسالة للعملاء</h1>
            <p>سيتم الارسال لجميع العملاء المسجلين</p>
        </div>

        <form id="whatsappForm">

            <div class="form-group">
                <textarea id="message" name="message" rows="4" placeholder="اكتب رسالتك هنا..." required></textarea>
            </div>

            <button type="submit">إرسال</button>

        </form>

    </div>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const message = document.getElementById('message').value;

            const formData = new FormData();
            formData.append('message', message);

            try {
                const response = await fetch('/send_whatsapp/send_message', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('تم إرسال الرسالة بنجاح');
                } else {
                    alert('حدث خطأ أثناء الإرسال');
                }
            } catch (error) {
                alert('تعذر الاتصال بالسيرفر');
            }
        });
    </script>

</body>

</html>
