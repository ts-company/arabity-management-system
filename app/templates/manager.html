<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard</title>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
    margin: 0;
    background-color: #0e1117;
    color: #e6e6e6;
    height: 100vh;
    overflow: hidden;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 70px;
    background-color: #161b22;
    border-bottom: 1px solid #2a2f3a;
    display: flex;
    align-items: center;
    padding: 0 30px;
    gap: 20px;
    z-index: 1000;
}

nav h1 {
    margin: 0;
    font-size: 18px;
    color: #58a6ff;
    margin-right: 30px;
    white-space: nowrap;
}

.nav-btn {
    background: none;
    border: 1px solid #2a2f3a;
    color: #e6e6e6;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.nav-btn:hover {
    background-color: #21262d;
}

/* CONTENT */
main {
    position: absolute;
    top: 70px;
    bottom: 0;
    left: 0;
    right: 0;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    background-color: #0e1117;
}
</style>
</head>

<body>

<nav>
    <h1>Manager</h1>

    <button class="nav-btn" onclick="loadPage('http://localhost:8000/cars')">
        Cars
    </button>

    <button class="nav-btn" onclick="loadPage('http://localhost:8000/receive')">
        Receive
    </button>

    <button class="nav-btn" onclick="loadPage('http://localhost:8000/delivery')">
        Delivery
    </button>

    <button class="nav-btn" onclick="loadPage('http://localhost:8000/comparison')">
        Comparison
    </button>

    <button class="nav-btn" onclick="logout()">
        Logout
    </button>
</nav>

<main>
    <iframe id="contentFrame" src="http://localhost:8000/cars"></iframe>
</main>

<script>
function loadPage(url) {
    document.getElementById("contentFrame").src = url;
}

async function logout() {
    try {
        await fetch("http://localhost:8000/logout", {
            method: "POST",
            credentials: "include"
        });

        window.location.href = "http://localhost:8000";
    } catch (e) {
        alert("Logout failed");
    }
}
</script>

</body>
</html>
