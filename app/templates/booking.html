<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Appointment booking Form</title>

    <style>
        body {
            background: #000000;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        form {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        input,
        select,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2f3a;
            background: #161b22;
            color: white;
        }

        button {
            grid-column: span 3;
            cursor: pointer;
            background: #2d2d2d;
            color: #e6e6e6;
            font-weight: bold;
            border: 1px solid #444;
        }

        button:hover {
            background: #3a3a3a;
        }

        h2 {
            grid-column: span 3;
            color: #9ca3af;
            margin-top: 20px;
        }

        /* Description checkbox UI */
        .description-box {
            grid-column: span 3;
            background: #161b22;
            border: 1px solid #2a2f3a;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .desc-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            background: #0e1117;
            border: 1px solid #2a2f3a;
            transition: background 0.2s, border 0.2s;
        }

        .desc-item:hover {
            background: #1f2633;
            border-color: #9ca3af;
        }

        .desc-item input {
            accent-color: #9ca3af;
        }

        .large-field {
            grid-column: span 3;
            min-height: 96px;
            padding: 10px;
            border-radius: 6px;
            resize: vertical;
            background: #0f1720;
            color: #e6e6e6;
            border: 1px solid #2a2f3a;
        }
    </style>
</head>

<body>

    <h2>حجز ميعاد</h2>

    <form id="bookingForm">

        <!-- Basic info -->
        <input name="day" id="day" placeholder="اليوم" readonly>
        <input type="date" name="current_date" id="date" readonly onfocus="this.blur()">
        <input name="customer_name" placeholder="اسم العميل" required autocomplete="off">
        <input type="date" name="receive_date" required autocomplete="off">
        <input name="customer_phone_number" placeholder="رقم الهاتف" required autocomplete="off">
        <input name="customer_email" placeholder="البريد الإلكتروني" required autocomplete="off">

        <input name="brand" placeholder="نوع السيارة" required autocomplete="off">
        <input name="model" placeholder="الموديل" required autocomplete="off">
        <input name="color" placeholder="اللون" required autocomplete="off">

        <input name="chassis_number" placeholder="رقم الشاسيه" required autocomplete="off">
        <input name="plate_number" placeholder="رقم اللوحة المعدنية" required autocomplete="off">
        <input name="mileage" placeholder="العداد" required autocomplete="off">

        <!-- Category -->
        <h2>البند</h2>
        <input name="category" required>

        <!-- Description -->
        <h2>الوصف</h2>
        <input name="fix_description" id="descriptionsField" required>
        <!-- Price category -->
        <h2>السعر</h2>
        <input name="total_price" id="price" placeholder="السعر الاجمالي" required>
        <button type="submit">Submit</button>
    </form>

    <script>

        const priceInput = document.getElementById("price");

        // auto-fill day name and date from user's computer
        function setLocalDayAndDate() {
            const now = new Date();
            const dayNames = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const dayEl = document.getElementById('day');
            const dateEl = document.getElementById('date');
            if (dayEl) dayEl.value = dayNames[now.getDay()];
            if (dateEl) dateEl.value = now.toISOString().slice(0, 10);

            // when user changes the date manually, update the day name accordingly
            if (dateEl) {
                dateEl.addEventListener('change', () => {
                    const d = new Date(dateEl.value);
                    if (!isNaN(d)) {
                        if (dayEl) dayEl.value = dayNames[d.getDay()];
                    }
                });
            }
        }

        setLocalDayAndDate();

        document.getElementById("bookingForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);


            const res = await fetch("http://localhost:8000/booking/save_form", {
                method: "POST",
                body: formData,
                credentials: "include"
            });

            if (!res.ok) {
                alert("فشل الحفظ");
                return;
            }

            alert("تم الحفظ بنجاح");
            data = await res.json();
            window.open(data.url);
        });

    </script>

</body>

</html>
