<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>الاستلامات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #000000;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header a {
            color: #cccccc;
            text-decoration: none;
        }

        header a:hover {
            color: #ffffff;
        }

        .form-section,
        .table-section {
            background-color: #000000;
            border: 1px solid #333333;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        /* INPUTS (no lining) */
        input,
        button {
            padding: 6px 8px;
            border-radius: 8px;
            border: none;
            background: #000000;
            color: #ffffff;
        }

        input:focus {
            outline: none;
            box-shadow: none;
        }

        /* ALL BUTTONS GRAY */
        button,
        button.accept,
        button.delete,
        .approve-btn {
            background-color: #444444;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover,
        .approve-btn:hover {
            background-color: #555555;
        }

        /* TABLE STYLE */
        table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid gold;
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            padding: 6px;
            text-align: right;
            border: none;
        }

        /* ROW HOVER */
        tr:hover {
            background-color: #2a2a2a;
        }

        .error {
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        /* approved row (very subtle) */
        tr.approved {
            background-color: rgba(255, 215, 0, 0.08);
        }

        /* CARDS */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }

        .card {
            background: #000000;
            border: 1px solid gold;
            border-radius: 16px;
            padding: 16px;
            transition: 0.25s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .card-section {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .card-section span {
            color: #aaaaaa;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="form-section">
        <h2>بحث</h2>
        <div style="display:flex; gap:10px;">
            <input id="pendingPhoneSearchInput" placeholder="ابحث برقم عاتف العميل" style="width:30%;">
        </div>
    </div>

    <div class="table-section">
        <h2>تنتطر الموافقة</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>اليوم</th>
                    <th>التاريخ</th>
                    <th>اسم العميل</th>
                    <th>وقت الاستلام</th>
                    <th>رقم هاتف العميل</th>
                    <th>البريد الإلكتروني</th>
                    <th>العلامة التجارية</th>
                    <th>الموديل</th>
                    <th>اللون</th>
                    <th>رقم الشاسيه</th>
                    <th>رقم اللوحة</th>
                    <th>العداد</th>
                    <th>البند</th>
                    <th>الوصف</th>
                    <th>السعر الاجمالي</th>
                    <th>المتبقي</th>
                    <th>المدفوع</th>
                    <th>ملاحظات</th>
                    <th>اسم الموظف</th>
                </tr>
            </thead>
            <tbody id="pendingTable"></tbody>
        </table>
    </div>
    <div class="form-section">
        <h2>بحث</h2>
        <div style="display:flex; gap:10px;">
            <input id="approvedPhoneSearchInput" placeholder="ابحث برقم عاتف العميل" style="width:30%;">
        </div>
    </div>

    <div class="table-section">
        <h2>قائمة الاستلامات</h2>
        <div id="approvedCards" class="cards-container"></div>
    </div>

    <script>
        let pending_forms = [];

        async function loadPending() {
            const tbody = document.getElementById("pendingTable");
            tbody.innerHTML = "";
            const res = await fetch("http://localhost:8000/receiving/get_pending_forms", { credentials: "include" });
            pending_forms = await res.json();
            renderPending(pending_forms);
        }

        function renderPending(forms) {
            const tbody = document.getElementById("pendingTable");
            tbody.innerHTML = "";

            forms.forEach(form => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td>${form.id}</td>
            <td>${form.day}</td>
            <td>${form.current_date || "-"}</td>
            <td>${form.customer_name || "-"}</td>
            <td>${form.receive_time || "-"}</td>
            <td>${form.customer_phone_number || "-"}</td>
            <td>${form.customer_email || "-"}</td>
            <td>${form.brand || "-"}</td>
            <td>${form.model || "-"}</td>
            <td>${form.color || "-"}</td>
            <td>${form.chassis_number || "-"}</td>
            <td>${form.plate_number || "-"}</td>
            <td>${form.mileage || "-"}</td>
            <td>${form.category || "-"}</td>
            <td>${form.fix_description || "-"}</td>
            <td>${form.total_price || "-"}</td>
            <td>${form.remains || "-"}</td>
            <td>${form.total_paid || "-"}</td>
            <td>${form.notes || "-"}</td>
            <td>${form.employee_name || "-"}</td>
            <td>
                <button class="delete" onclick="accept(${form.id})">موافقة</button>
            </td>
            <td>
                <button class="delete" onclick="deleteForm(${form.id})">حذف</button>
            </td>
        `;
                tbody.appendChild(tr);
            });
        }


        function applySearch() {
            const modelQuery = document.getElementById("searchInput").value.toLowerCase();
            const phoneQuery = document.getElementById("phoneSearchInput").value.toLowerCase();

            renderCars(
                allCars.filter(c =>
                    c.model.toLowerCase().includes(modelQuery) &&
                    (c.customer_phone_number || "").toLowerCase().includes(phoneQuery)
                )
            );
        }
        async function accept(id) {
            const res = await fetch(`http://localhost:8000/receiving/approve_form/${id}`, {
                method: "PATCH",
                credentials: "include"
            });
            loadPending();
            loadApproved();
        }

        loadPending();

        let approved = [];

        async function loadApproved() {
            const container = document.getElementById("approvedCards");
            container.innerHTML = "";

            const res = await fetch(
                "http://localhost:8000/receiving/get_approved_forms",
                { credentials: "include" }
            );

            approved = await res.json();
            renderApproved(approved);
        }

        function renderApproved(forms) {
            const container = document.getElementById("approvedCards");
            container.innerHTML = "";

            forms.forEach(form => {
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
            <div class="card-header">
                <div>ID: ${form.id}</div>
                <div>${form.employee_name || "-"}</div>
            </div>

            <div class="card-section">
                <span>العميل:</span> ${form.customer_name || "-"}
            </div>

            <div class="card-section">
                <span>الهاتف:</span> ${form.customer_phone_number || "-"}
            </div>

            <div class="card-section">
                <span>السيارة:</span>
                ${form.brand || "-"} ${form.model || "-"} - ${form.color || "-"}
            </div>

            <div class="card-section">
                <span>السعر الكلي:</span> ${form.total_price || "-"}
            </div>

            <div class="card-section">
                <span>المدفوع:</span> ${form.total_paid || "-"}
            </div>

            <div class="card-section">
                <span>البند:</span> ${form.category || "-"}
            </div>

            <div class="card-section">
                <span>الوصف:</span> ${form.fix_description || "-"}
            </div>

            <div class="card-section">
                <span>رسالة المندوب:</span> ${form.repr_message || "-"}
            </div>

            <div class="card-actions">
            <input type="number"
                placeholder="ثمن الشراء"
                id="buying_price-${form.id}"
                style="width:120px;"
                oninput="calculateRevenue(${form.id})">

            <input type="number"
                placeholder="ثمن البيع"
                id="selling_price-${form.id}"
                style="width:120px;"
                oninput="calculateRevenue(${form.id})">

            <input type="number"
                placeholder="الربح"
                id="revenue-${form.id}"
                style="width:100px;"
                readonly>

                <button onclick="submitRevenue(${form.id})">
                    تسجيل
                </button>

                <button onclick="window.open('${form.pdf_url}', '_blank')">
                    PDF
                </button>

                <button onclick="deleteForm(${form.id})">
                    حذف
                </button>

            </div>
        `;

                container.appendChild(card);
            });
        }
        loadApproved();

        async function submitRevenue(formId) {

            const byingInput = document.getElementById(`buying_price-${formId}`);
            const buying = byingInput.value;

            if (!buying) {
                alert("من فضلك أدخل مبلغ الشراء");
                return;
            }

            const sellingInput = document.getElementById(`selling_price-${formId}`);
            const selling = sellingInput.value;

            if (!selling) {
                alert("من فضلك أدخل مبلغ البيع");
                return;
            }


            const revenueInput = document.getElementById(`revenue-${formId}`);
            const revenue = revenueInput.value;

            const formData = new FormData();
            formData.append("buying_price", buying)
            formData.append("selling_price", selling)

            try {
                const res = await fetch(
                    `http://localhost:8000/receiving/add_revenue/${formId}`,
                    {
                        method: "PATCH",
                        body: formData,
                        credentials: "include"
                    }
                );

                if (!res.ok) {
                    alert("فشل التسجيل");
                    return;
                }

                alert("تم التسجيل");
                return;

            } catch (e) {
                alert(e.message);
            }
        }

        function calculateRevenue(formId) {
            const buying = parseFloat(
                document.getElementById(`buying_price-${formId}`).value
            ) || 0;

            const selling = parseFloat(
                document.getElementById(`selling_price-${formId}`).value
            ) || 0;

            const revenue = selling - buying;

            document.getElementById(`revenue-${formId}`).value = revenue;
        }

        async function deleteForm(id) {
            if (!confirm("هل أنت متأكد؟")) return;
            const res = await fetch(`http://localhost:8000/receiving/delete_form/${id}`, {
                method: "DELETE",
                credentials: "include"
            });
            if (!res.ok) {
                alert("فشل الحذف")
                return;
            };
            loadApproved();
        }

        function pending_applySearch() {
            const phoneQuery = document.getElementById("pendingPhoneSearchInput").value.toLowerCase();

            renderPending(
                pending_forms.filter(c =>
                    (c.customer_phone_number || "").toLowerCase().includes(phoneQuery)
                )
            );
        }

        document.getElementById("pendingPhoneSearchInput").addEventListener("input", pending_applySearch);


        function approved_applySearch() {
            const phoneQuery = document.getElementById("approvedPhoneSearchInput").value.toLowerCase();

            renderApproved(
                approved.filter(c =>
                    (c.customer_phone_number || "").toLowerCase().includes(phoneQuery)
                )
            );
        }

        document.getElementById("approvedPhoneSearchInput").addEventListener("input", approved_applySearch);

    </script>
</body>
