<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة السيارات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background-color: #0f172a;
    color: #f1f5f9;
    font-family: Arial, sans-serif;
    margin: 0;
}
.container {
    max-width: 1600px;
    margin: auto;
    padding: 20px;
}
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
header a { color: #cbd5e1; text-decoration: none; }
header a:hover { color: #fff; }

.form-section, .table-section {
    background-color: rgba(30,30,50,0.8);
    border: 1px solid rgba(100,100,120,0.5);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    overflow-x: auto;
}
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
    gap: 10px;
}
input, button {
    padding: 6px 8px;
    border-radius: 8px;
    border: none;
    background: rgba(15,23,42,0.7);
    color: #f1f5f9;
}
button {
    cursor: pointer;
    font-weight: bold;
}
button.add { background: linear-gradient(to left, #34d399, #14b8a6); color: #000; }
button.delete { background-color: #f87171; color: #000; }

table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 6px;
    border-bottom: 1px solid rgba(100,100,120,0.5);
    text-align: right;
}
tr:hover { background-color: rgba(100,100,150,0.2); }

.error { color: #f87171; margin-bottom: 10px; }
</style>
</head>

<body>
<div class="container">
<header>
    <h1>إدارة السيارات</h1>
</header>

<div class="error" id="error"></div>

<!-- Add Car -->
<div class="form-section">
<h2>إضافة سيارة</h2>
<form class="form-grid" id="addCarForm">
    <input required placeholder="الموديل" name="model">
    <input required placeholder="الشركة" name="brand">
    <input required type="number" placeholder="السنة" name="year">
    <input placeholder="اسم العميل" name="customer_name">
    <input placeholder="رقم العميل" name="customer_phone_number">
    <input placeholder="رقم الشاسيه" name="chassis_number">
    <input required placeholder="اللون" name="color">
    <select required name="state">
        <option value="" disabled selected>الحالة</option>
        <option value="in stock">in stock</option>
        <option value="not available">not available</option>
    </select>
    <input type="number" placeholder="السعر" name="price">
    <input type="number" placeholder="العداد" name="mileage">
    <input placeholder="رقم اللوحة" name="plate_number">
    <input type="date" placeholder="تاريخ الاستلام" name="receive_date">
    <input type="date" placeholder="تاريخ التسليم" name="delivery_date">
    <input type="number" placeholder="تكلفة التصليح" name="repair_cost">
    <input placeholder="وصف التصليح" name="fix_description">
    <button class="add" type="submit">إضافة</button>
</form>
</div>

<div class="form-section">
<h2>بحث السيارات</h2>
<div style="display:flex; gap:10px;">
    <input id="searchInput" placeholder="ابحث بالموديل" style="width:50%;">
    <input id="phoneSearchInput" placeholder="ابحث برقم الهاتف" style="width:50%;">
</div>
</div>

<div class="table-section">
<h2>قائمة السيارات</h2>
<table>
<thead>
<tr>
    <th>ID</th>
    <th>الموديل</th>
    <th>الشركة</th>
    <th>السنة</th>
    <th>العميل</th>
    <th>الهاتف</th>
    <th>رقم الشاسيه</th>
    <th>اللون</th>
    <th>الحالة</th>
    <th>السعر</th>
    <th>العداد</th>
    <th>اللوحة</th>
    <th>تاريخ الاستلام</th>
    <th>تاريخ التسليم</th>
    <th>تكلفة التصليح</th>
    <th>وصف التصليح</th>
    <th>إجراءات</th>
</tr>
</thead>
<tbody id="carsTable"></tbody>
</table>
</div>
</div>

<script>
const errorDiv = document.getElementById("error");
let allCars = [];

async function loadCars() {
    const tbody = document.getElementById("carsTable");
    tbody.innerHTML = "";
    try {
        const res = await fetch("http://localhost:8000/cars/get_cars", { credentials:"include" });
        allCars = await res.json();
        renderCars(allCars);
    } catch (e) {
        errorDiv.textContent = e.message;
    }
}

function renderCars(cars) {
    const tbody = document.getElementById("carsTable");
    tbody.innerHTML = "";

    cars.forEach(car => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${car.id}</td>
            <td>${car.model}</td>
            <td>${car.brand}</td>
            <td>${car.year || "-"}</td>
            <td>${car.customer_name || "-"}</td>
            <td>${car.customer_phone_number || "-"}</td>
            <td>${car.chassis_number || "-"}</td>
            <td>${car.color || "-"}</td>
            <td>${car.state || "-"}</td>
            <td>${car.price || "-"}</td>
            <td>${car.mileage || "-"}</td>
            <td>${car.plate_number || "-"}</td>
            <td>${car.receive_date || "-"}</td>
            <td>${car.delivery_date || "-"}</td>
            <td>${car.repair_cost || "-"}</td>
            <td>${car.fix_description || "-"}</td>
            <td>
                <button onclick="toggleEdit(${car.id})">تعديل</button>
                <button class="delete" onclick="deleteCar(${car.id})">حذف</button>
            </td>
        `;

        const editTr = document.createElement("tr");
        editTr.innerHTML = `
            <td colspan="17">
                <div id="edit-${car.id}" style="display:none; gap:6px; flex-wrap:wrap;">
                    <input value="${car.model}" id="model-${car.id}">
                    <input value="${car.brand}" id="brand-${car.id}">
                    <input type="number" value="${car.year || ""}" id="year-${car.id}">
                    <input value="${car.customer_name || ""}" id="customer_name-${car.id}">
                    <input value="${car.customer_phone_number || ""}" id="customer_phone-${car.id}">
                    <input value="${car.chassis_number || ""}" id="chassis-${car.id}">
                    <input value="${car.color || ""}" id="color-${car.id}">
                    <select value="${car.state || ""}" id="state-${car.id}">
                        <option value="" disabled selected>الحالة</option>
                        <option value="in stock">in stock</option>
                        <option value="not available">not available</option>
                    </select>
                    <input type="number" value="${car.price || ""}" id="price-${car.id}">
                    <input type="number" value="${car.mileage || ""}" id="mileage-${car.id}">
                    <input value="${car.plate_number || ""}" id="plate-${car.id}">
                    <input type="date" value="${car.receive_date || ""}" id="receive-${car.id}">
                    <input type="date" value="${car.delivery_date || ""}" id="delivery-${car.id}">
                    <input type="number" value="${car.repair_cost || ""}" id="repair-${car.id}">
                    <input value="${car.fix_description || ""}" id="fix-${car.id}">
                    <button onclick="saveCar(${car.id})">حفظ</button>
                    <button onclick="toggleEdit(${car.id})">إلغاء</button>
                </div>
            </td>
        `;

        tbody.appendChild(tr);
        tbody.appendChild(editTr);
    });
}

document.getElementById("addCarForm").addEventListener("submit", async e => {
    e.preventDefault();
    const formData = new FormData(e.target);

    for (const [key, value] of [...formData.entries()]) {
        if (value === "") {
            formData.delete(key);
        }
    }
    try {
        const res = await fetch("http://localhost:8000/cars/add_car", {
            method: "POST",
            body: formData,
            credentials: "include"
        });
        if (!res.ok){
            errorDiv.textContent = "فشل الإضافة";
            return;
        }
        errorDiv.textContent = "تمت إضافة السيارة بنجاح";
        e.target.reset();
        loadCars();
    } catch (e) {
        errorDiv.textContent = e.message;
    }
});

async function deleteCar(id) {
    if (!confirm("هل أنت متأكد؟")) return;
    try {
        const res = await fetch(`http://localhost:8000/cars/delete_car/${id}`, {
            method: "DELETE",
            credentials: "include"
        });
        if (!res.ok) throw new Error("فشل الحذف");
        loadCars();
    } catch (e) {
        errorDiv.textContent = e.message;
    }
}

function toggleEdit(id) {
    const el = document.getElementById(`edit-${id}`);
    el.style.display = el.style.display === "flex" ? "none" : "flex";
}

async function saveCar(id) {
    const formData = new FormData();

    const fields = {
        model: `model-${id}`,
        brand: `brand-${id}`,
        year: `year-${id}`,
        customer_name: `customer_name-${id}`,
        customer_phone_number: `customer_phone-${id}`,
        chassis_number: `chassis-${id}`,
        color: `color-${id}`,
        state: `state-${id}`,
        price: `price-${id}`,
        mileage: `mileage-${id}`,
        plate_number: `plate-${id}`,
        receive_date: `receive-${id}`,
        delivery_date: `delivery-${id}`,
        repair_cost: `repair-${id}`,
        fix_description: `fix-${id}`
    };

    for (const key in fields) {
        const el = document.getElementById(fields[key]);
        if (!el) continue;

        const val = el.value;

        if (val !== "") {
            formData.append(key, val);
        }
    }

    try {
        const res = await fetch(`http://localhost:8000/cars/edit_car/${id}`, {
            method: "PATCH",
            body: formData,
            credentials: "include"
        });

        if (!res.ok) {
            const e = await res.json();
            errorDiv.textContent = e.detail || "فشل التعديل";
            return;
        }

        errorDiv.textContent = "تم التعديل";
        toggleEdit(id);
        loadCars();
    } catch (e) {
        errorDiv.textContent = e.message;
    }
}

function applySearch() {
    const modelQuery = document.getElementById("searchInput").value.toLowerCase();
    const phoneQuery = document.getElementById("phoneSearchInput").value.toLowerCase();

    renderCars(
        allCars.filter(c =>
            c.model.toLowerCase().includes(modelQuery) &&
            (c.customer_phone_number || "").toLowerCase().includes(phoneQuery)
        )
    );
}

document.getElementById("searchInput").addEventListener("input", applySearch);
document.getElementById("phoneSearchInput").addEventListener("input", applySearch);

loadCars();
</script>
</body>
</html>
