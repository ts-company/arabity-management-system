<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>المرتبات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header a {
            color: #e5e7eb;
            text-decoration: none;
        }

        header a:hover {
            color: #ffffff;
        }

        .form-section,
        .table-section {
            background-color: #000000;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            border-left: 1px solid #d4af37;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        input,
        button {
            padding: 6px 8px;
            border-radius: 8px;
            border: none;
            background: #444444;
            color: #ffffff;
        }

        button {
            cursor: pointer;
            font-weight: bold;
            background-color: #888888;
            color: #000;
        }

        button:hover {
            background-color: #aaaaaa;
        }

        button.accept {
            background-color: #888888;
            color: #000;
        }

        button.delete {
            background-color: #888888;
            color: #000;
        }

        .approve-btn {
            background-color: #888888;
            color: #000;
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 6px;
            border-bottom: 1px solid rgba(100, 100, 120, 0.5);
            text-align: right;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .error {
            color: #f87171;
            margin-bottom: 10px;
        }

        tr.approved {
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>

    <head>

    <body class="bg-black">
        <div>
            <div class="w-full max-w-2xl">
                <div class="grid grid-cols-3 gap-6">
                </div>
            </div>
            <div class="form-section">
                <h2>بحث الموظفين</h2>
                <div>
                    <input id="phoneSearchInput" placeholder="ابحث برقم الهاتف">
                </div>
            </div>

            <div class="table-section">
                <h2>جدول المرتبات</h2>
                <table>
                    <thead>
                        <tr>
                            <th>id</th>
                            <th>اسم الموظف</th>
                            <th>رقم الهاتف</th>
                            <th>الراتب</th>
                            <th>الخصومات</th>
                            <th>اجمالي الراتب</th>
                        </tr>
                    </thead>
                    <tbody id="salary_forms"></tbody>
                </table>
            </div>
</head>
<script>
    let all_salary_forms = [];

    // ✅ تحميل الداتا من الباك اند
    async function loadSalaryForms() {
        try {
            const res = await fetch("http://localhost:8000/salaries");
            const data = await res.json();

            all_salary_forms = data;
            render_salary_forms(all_salary_forms);

        } catch (e) {
            console.log(e);
            alert("فشل تحميل البيانات");
        }
    }

    // ✅ عرض البيانات في الجدول
    function render_salary_forms(forms) {
        const tbody = document.getElementById("salary_forms");
        tbody.innerHTML = "";

        forms.forEach(form => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td>${form.id}</td>
            <td>${form.employee_name || "-"}</td>
            <td>${form.employee_phone_number || "-"}</td>
            <td class="salary">${form.salary || 0}</td>

            <td>
                <input type="number" class="deductions" value="${form.deductions || 0}">
            </td>
            <td class="total"></td>
        `;
            tbody.appendChild(tr);
        });
    }

    // ✅ البحث برقم الهاتف
    function applySearch() {
        const phoneQuery = document.getElementById("phoneSearchInput").value.toLowerCase();

        const filtered = all_salary_forms.filter(f =>
            (f.employee_phone_number || "").toLowerCase().includes(phoneQuery)
        );

        render_salary_forms(filtered);
    }

    // ✅ إرسال التعديلات للباك اند
    async function sendDeductions(id, deductions) {
        try {
            const formData = new FormData();

            formData.append("id", id);
            formData.append("deductions", deductions);

            const res = await fetch("http://localhost:8000/salaries", {
                method: "POST", // أو PUT حسب الباك
                body: formData // 👈 هنا بدل JSON
            });

            const result = await res.json();
            console.log("تم الإرسال:", result);

        } catch (error) {
            console.log("Error:", error);
        }
    }

    // ✅ تعديل الخصومات + حساب الإجمالي + إرسال
    document.addEventListener("input", function (e) {
        if (e.target.classList.contains("deductions")) {

            const row = e.target.closest("tr");

            let salary = parseFloat(row.querySelector(".salary").innerText) || 0;
            let deductions = parseFloat(e.target.value) || 0;

            // تنظيف الإدخال
            e.target.value = e.target.value.replace(/[^0-9]/g, '');

            if (deductions > salary) {
                deductions = salary;
                e.target.value = salary;
            }

            let total = Math.max(0, salary - deductions);
            row.querySelector(".total").innerText = total;

            // ✅ هنا المهم: نبعت الخصومات بس
            sendDeductions(
                parseInt(row.children[0].innerText),
                deductions
            );
        }
    });

    document.getElementById("phoneSearchInput").addEventListener("input", applySearch);

    loadSalaryForms();
</script>
