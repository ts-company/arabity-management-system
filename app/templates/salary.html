<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إدارة المرتبات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
     body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            font-size: 16px;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header a {
            color: #ffffff;
            text-decoration: none;
        }

        header a:hover {
            color: #fff;
        }

        .form-section,
        .table-section {
            background-color: #000000;
            border: 2px solid rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .form-section h2,
        .table-section h2 {
            font-size: 22px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            background: #444444;
            color: #ffffff;
            font-size: 15px;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background-color: #888888 !important;
            color: #000 !important;
            font-size: 14px;
        }

        button.add {
            background-color: #888888 !important;
            color: #000 !important;
        }

        button.delete {
            background-color: #888888 !important;
            color: #000 !important;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(100, 100, 120, 0.5);
            text-align: right;
            font-size: 14px;
        }

        tr:hover {
            background-color: rgba(100, 100, 150, 0.2);
        }

        .error {
            color: #f87171;
            margin-bottom: 10px;
        }

        .deduction-input {
            width: 100px;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #34d399;
            background: rgba(15, 23, 42, 0.8);
            color: #f1f5f9;
            font-size: 14px;
        }

        .deduction-input:focus {
            outline: none;
            border: 1px solid #34d399;
            background: rgba(15, 23, 42, 0.95);
        }

        .save-btn {
            padding: 6px 12px;
            background: #34d399;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            margin-right: 5px;
        }

        .save-btn:hover {
            opacity: 0.8;
        }

        .deduction-cell {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .form-section,
            .table-section {
                padding: 15px;
                margin-bottom: 10px;
            }
            
            input {
                width: 100%;
                padding: 8px 10px;
                font-size: 14px;
            }
            
            th, td {
                padding: 8px;
                font-size: 14px;
            }
            
            button {
                padding: 8px 12px;
                font-size: 14px;
            }
            
            .deduction-input {
                width: 80px;
                padding: 4px;
                font-size: 14px;
            }
            
            .save-btn {
                padding: 4px 8px;
                font-size: 12px;
            }
            
            .deduction-cell {
                flex-direction: column;
                gap: 2px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>المرتبات</h1>
        </header>

        <div class="form-section">
            <h2>البحث</h2>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="ابحث برقم الهاتف..."
                    oninput="liveSearch()"
                >
            </div>
            <div id="errorMessage"></div>
        </div>

        <div class="table-section">
            <table>
                <thead>
                    <tr>
                        <th>الرقم</th>
                        <th>اسم الموظف</th>
                        <th>رقم الهاتف</th>
                        <th>الراتب</th>
                        <th>الخصم</th>
                        <th>الإجمالي</th>
                    </tr>
                </thead>
                <tbody id="salaryTable">
                    <tr>
                        <td colspan="6" class="loading">جاري تحميل البيانات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allEmployees = []; // لتخزين كل البيانات

        // تحميل البيانات عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            loadSalaryData();
        });

        async function loadSalaryData() {
            const tableBody = document.getElementById('salaryTable');
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                errorDiv.innerHTML = '';
                tableBody.innerHTML = '<tr><td colspan="6" class="loading">جاري تحميل البيانات...</td></tr>';
                
                const response = await fetch('/salary/get_salaries');
                
                if (!response.ok) {
                    throw new Error('فشل تحميل البيانات: ' + response.status);
                }
                
                allEmployees = await response.json();
                displayTable(allEmployees);
                
            } catch (error) {
                console.error('Error:', error);
                errorDiv.innerHTML = '<div class="error">خطأ في تحميل البيانات: ' + error.message + '</div>';
                tableBody.innerHTML = '<tr><td colspan="6" class="no-data">لم يتمكن من تحميل البيانات</td></tr>';
            }
        }

        function displayTable(employees) {
            const tableBody = document.getElementById('salaryTable');
            
            if (!employees || employees.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="no-data">لا توجد بيانات موظفين</td></tr>';
                return;
            }
            
            let html = '';
            employees.forEach((emp, index) => {
                const salary = parseFloat(emp.salary) || 0;
                const deduction = parseFloat(emp.deduction) || 0;
                const total = salary - deduction;
                
                html += `
                    <tr>
                        <td>${emp.id}</td>
                        <td>${emp.name}</td>
                        <td>${emp.phone_number}</td>
                        <td>${salary.toFixed(2)}</td>
                        <td>
                            <div class="deduction-cell">
                                <input 
                                    type="number" 
                                    class="deduction-input" 
                                    id="deduction-${emp.id}" 
                                    value="${deduction.toFixed(2)}" 
                                    step="0.01"
                                >
                                <button class="save-btn" onclick="saveDeduction(${emp.id})">حفظ</button>
                            </div>
                        </td>
                        <td class="total-amount" id="total-${emp.id}">${total.toFixed(2)}</td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
        }

        function liveSearch() {
            const searchValue = document.getElementById('searchInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.innerHTML = '';
            
            if (!searchValue) {
                displayTable(allEmployees);
                return;
            }
            
            // البحث الفوري في البيانات المحملة
            const filteredEmployees = allEmployees.filter(emp => 
                emp.phone_number.includes(searchValue)
            );
            
            if (filteredEmployees.length === 0) {
                document.getElementById('salaryTable').innerHTML = 
                    '<tr><td colspan="6" class="no-data">لم يتم العثور على موظف برقم هاتف: ' + searchValue + '</td></tr>';
            } else {
                displayTable(filteredEmployees);
            }
        }

        async function saveDeduction(employeeId) {
            const deductionInput = document.getElementById(`deduction-${employeeId}`);
            const deductionValue = parseFloat(deductionInput.value);
            const errorDiv = document.getElementById('errorMessage');
            
            if (isNaN(deductionValue)) {
                errorDiv.innerHTML = '<div class="error">الرجاء إدخال قيمة صحيحة للخصم</div>';
                return;
            }
            
            try {
                errorDiv.innerHTML = '';
                const formData = new FormData();
                formData.append('deduction', deductionValue);
                
                const response = await fetch(`/salary/add_deduction/${employeeId}`, {
                    method: 'PATCH',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('فشل حفظ الخصم');
                }
                
                // تحديث قيمة الإجمالي على الفور
                const employee = allEmployees.find(e => e.id === employeeId);
                if (employee) {
                    const salary = parseFloat(employee.salary) || 0;
                    const total = salary - deductionValue;
                    document.getElementById(`total-${employeeId}`).textContent = total.toFixed(2);
                }
                
            } catch (error) {
                console.error('Error:', error);
                errorDiv.innerHTML = '<div class="error">خطأ: ' + error.message + '</div>';
            }
        }
    </script>
</body>

</html>
