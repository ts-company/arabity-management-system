<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body {
    background-color: #000000;
    color: #f5f5f5;
    font-family: Arial, sans-serif;
    margin: 0;
}

.container {
    max-width: 1600px;
    margin: auto;
    padding: 20px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

header a {
    color: #cccccc;
    text-decoration: none;
}

header a:hover {
    color: #ffffff;
}

/* Sections */
.form-section,
.table-section {
    background-color: #000000;
    border: 1px solid #333333;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    overflow-x: auto;
}

/* Form grid */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
}

/* Inputs */
input {
    padding: 6px 8px;
    border-radius: 8px;
    border: none;
    background: #000000;
    color: #ffffff;
}

input:focus {
    outline: none;
    box-shadow: none;
}

/* Buttons */
button,
button.accept,
button.delete,
.approve-btn {
    padding: 6px 8px;
    border-radius: 8px;
    border: none;
    background-color: #444444;
    color: #ffffff;
    cursor: pointer;
    font-weight: bold;
}

button:hover,
.approve-btn:hover {
    background-color: #555555;
}

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    background-color: #000000;
    position: relative; /* needed for the pseudo-element */
}

/* Gold line on the left */
table::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 1px;          /* thickness of the gold line */
    height: 100%;
    background-color: gold;
    border-radius: 2px;
}

/* Table cells */
th, td {
    padding: 6px;
    text-align: right;
    border: none; /* no inner borders */
}

/* Row hover */
tr:hover {
    background-color: #2a2a2a;
}

/* Error messages */
.error {
    color: #ff6b6b;
    margin-bottom: 10px;
}

/* Approved rows subtle gold */
tr.approved {
    background-color: rgba(255,215,0,0.08);
}

.calendar-section {
    background-color: #000000;
    border: 1px solid #333333;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.calendar button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background-color: #444444;
    color: #ffffff;
    cursor: pointer;
    font-weight: bold;
}

.calendar button:hover {
    background-color: #555555;
}

.calendar button.has-appointment {
    background-color: gold;
    color: #000000;
}
    </style>
</head>

<body>
    <div class="calendar-section">
        <h2>التقويم</h2>
        <button onclick="showAllAppointments()">عرض الكل</button>
        <div class="calendar">
            <button id="day-1">1</button>
            <button id="day-2">2</button>
            <button id="day-3">3</button>
            <button id="day-4">4</button>
            <button id="day-5">5</button>
            <button id="day-6">6</button>
            <button id="day-7">7</button>
            <button id="day-8">8</button>
            <button id="day-9">9</button>
            <button id="day-10">10</button>
            <button id="day-11">11</button>
            <button id="day-12">12</button>
            <button id="day-13">13</button>
            <button id="day-14">14</button>
            <button id="day-15">15</button>
            <button id="day-16">16</button>
            <button id="day-17">17</button>
            <button id="day-18">18</button>
            <button id="day-19">19</button>
            <button id="day-20">20</button>
            <button id="day-21">21</button>
            <button id="day-22">22</button>
            <button id="day-23">23</button>
            <button id="day-24">24</button>
            <button id="day-25">25</button>
            <button id="day-26">26</button>
            <button id="day-27">27</button>
            <button id="day-28">28</button>
            <button id="day-29">29</button>
            <button id="day-30">30</button>
            <button id="day-31">31</button>
        </div>
    </div>
    <div class="form-section">
        <h2>بحث</h2>
        <div style="display:flex; gap:10px;">
            <input id="phoneSearchInput" placeholder="ابحث برقم عاتف العميل" style="width:50%;">
        </div>
    </div>

    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>اليوم</th>
                    <th>التاريخ</th>
                    <th>اسم العميل</th>
                    <th>رقم الهاتف</th>
                </tr>
            </thead>
            <tbody id="appointmentsTable"></tbody>
        </table>
    </div>

    <script>
        let appointments = [];
        let allAppointments = [];

        async function loadAppointments() {
            const tbody = document.getElementById("appointmentsTable");
            tbody.innerHTML = "";
            const res = await fetch("http://localhost:8000/appointment/get_appointments", { credentials: "include" });
            appointments = await res.json();
            allAppointments = [...appointments];
            
            // تحديد الأيام التي لها مواعيد
            let daysWithAppointments = new Set();
            appointments.forEach(form => {
                if (form.current_date) {
                    let parts = form.current_date.split('-');
                    if (parts.length === 3) {
                        let day = parseInt(parts[2]);
                        if (!isNaN(day)) {
                            daysWithAppointments.add(day);
                        }
                    }
                }
            });
            
            // إضافة كلاس و onclick للأزرار
            for (let day = 1; day <= 31; day++) {
                let btn = document.getElementById(`day-${day}`);
                if (btn) {
                    if (daysWithAppointments.has(day)) {
                        btn.classList.add('has-appointment');
                    }
                    btn.onclick = () => filterByDay(day);
                }
            }
            
            renderAppointments(appointments);
        }

        function renderAppointments(forms) {
            const tbody = document.getElementById("appointmentsTable");
            tbody.innerHTML = "";

            forms.forEach(form => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td>${form.id}</td>
            <td>${form.day}</td>
            <td>${form.current_date || "-"}</td>
            <td>${form.customer_name || "-"}</td>
            <td>${form.customer_phone_number || "-"}</td>
            <td>
                <button class="delete" onclick="delete_appointment(${form.id})">حذف</button>
            </td>
        `;
                tbody.appendChild(tr);
            });
        }

        function filterByDay(day) {
            appointments = allAppointments.filter(form => {
                if (!form.current_date) return false;
                let parts = form.current_date.split('-');
                if (parts.length !== 3) return false;
                let formDay = parseInt(parts[2]);
                return formDay === day;
            });
            renderAppointments(appointments);
        }

        function showAllAppointments() {
            appointments = [...allAppointments];
            renderAppointments(appointments);
        }

        function applySearch() {
            const phoneQuery = document.getElementById("phoneSearchInput").value.toLowerCase();

            renderAppointments(
                appointments.filter(c =>
                    (c.customer_phone_number || "").toLowerCase().includes(phoneQuery)
                )
            );
        }
        
        async function delete_appointment(id) {
            const res = await fetch(`http://localhost:8000/appointment/delete_appointment/${id}`, {
                method: "DELETE",
                credentials: "include"
            });
            loadAppointments();
        }
        document.getElementById("phoneSearchInput").addEventListener("input", applySearch);
        loadAppointments();
    </script>
</body>
