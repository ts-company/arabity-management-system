<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>استمارة المفايسة</title>

    <style>
        body {
            background: #000000;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        form {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        input,
        select,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2f3a;
            background: #161b22;
            color: white;
        }

        button {
            grid-column: span 3;
            cursor: pointer;
            background: #2d2d2d;
            color: #e6e6e6;
            font-weight: bold;
            border: 1px solid #444;
        }

        button:hover {
            background: #3a3a3a;
        }

        h2 {
            grid-column: span 3;
            color: #9ca3af;
            margin-top: 20px;
        }

        /* Description checkbox UI */
        .description-box {
            grid-column: span 3;
            background: #161b22;
            border: 1px solid #2a2f3a;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .desc-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            background: #0e1117;
            border: 1px solid #2a2f3a;
            transition: background 0.2s, border 0.2s;
        }

        .desc-item:hover {
            background: #1f2633;
            border-color: #9ca3af;
        }

        .desc-item input {
            accent-color: #9ca3af;
        }

        .large-field {
            grid-column: span 3;
            min-height: 96px;
            padding: 10px;
            border-radius: 6px;
            resize: vertical;
            background: #0f1720;
            color: #e6e6e6;
            border: 1px solid #2a2f3a;
        }

        .signature-section {
            grid-column: span 3;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #2a2f3a;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .signature-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .signature-field label {
            color: #9ca3af;
            font-size: 14px;
        }

        .signature-field input {
            border-bottom: 2px solid #9ca3af;
            background: transparent;
            padding: 8px 5px;
        }

        .signature-field input:focus {
            outline: none;
            border-bottom: 2px solid #e6e6e6;
        }
    </style>
</head>

<body>

    <div class="bg-black px-4 py-8 text-center">
        <h1 class="text-gray-400 text-4xl font-bold">مقايسة سيارة</h1>
    </div>

    <form id="receiveForm">

        <!-- Basic info -->
        <input name="day" id="day" placeholder="اليوم" readonly>
        <input type="date" name="current_date" id="date" readonly onfocus="this.blur()">
        <input name="customer_name" placeholder="اسم العميل" required autocomplete="off">

        <input type="date" name="receive_date" required autocomplete="off">
        <input name="customer_phone_number" placeholder="رقم الهاتف" required autocomplete="off">
        <input name="customer_email" placeholder="البريد الإلكتروني" required autocomplete="off">

        <input name="brand" placeholder="نوع السيارة" required autocomplete="off">
        <input name="model" placeholder="الموديل" required autocomplete="off">
        <input name="color" placeholder="اللون" required autocomplete="off">

        <input name="chassis_number" placeholder="رقم الشاسيه" required autocomplete="off">
        <input name="plate_number" placeholder="رقم اللوحة المعدنية" required autocomplete="off">
        <input name="mileage" placeholder="العداد" required autocomplete="off">
        <input name="category" placeholder="البند" required autocomplete="off">
        <input name="fix_description" placeholder="الوصف" required autocomplete="off">
        <input name="total_price" placeholder=" الإجمالي" required autocomplete="off">
        <button type="submit">Submit</button>
    </form>

    <script>
        // Set current date and day
        const dateInput = document.getElementById('date');
        const dayInput = document.getElementById('day');
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateInput.value = today.toISOString().split('T')[0];
        dayInput.value = today.toLocaleDateString('ar-EG', options);

        function setLocalDayAndDate() {
            const now = new Date();

            // fix timezone offset to get local date
            const offset = now.getTimezoneOffset() * 60000; // in ms
            const localNow = new Date(now.getTime() - offset);
            const localISO = localNow.toISOString().slice(0, 10); // "YYYY-MM-DD"

            const dayNames = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const dayEl = document.getElementById('day');
            const dateEl = document.getElementById('date');

            if (dayEl) dayEl.value = dayNames[now.getDay()]; // day name for current local date
            if (dateEl) dateEl.value = localISO;

            // Update day name if user manually changes the date
            if (dateEl) {
                dateEl.addEventListener('change', () => {
                    const d = new Date(dateEl.value);
                    if (!isNaN(d)) {
                        if (dayEl) dayEl.value = dayNames[d.getDay()];
                    }
                });
            }
        }

        setLocalDayAndDate();


        document.getElementById("receiveForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);

            const res = await fetch("http://localhost:8000/comparison/save_form", {
                method: "POST",
                body: formData,
                credentials: "include"
            });

            if (!res.ok) {
                alert("فشل الحفظ");
                return;
            }

            alert("تم الحفظ بنجاح");
        });

    </script>
