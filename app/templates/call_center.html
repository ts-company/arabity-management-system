<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>خدمة العملاء</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            font-size: 16px;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header a {
            color: #ffffff;
            text-decoration: none;
        }

        header a:hover {
            color: #fff;
        }

        .form-section,
        .table-section {
            background-color: #000000;
            border: 2px solid rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .form-section h2,
        .table-section h2 {
            font-size: 22px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            background: #444444;
            color: #ffffff;
            font-size: 15px;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background-color: #888888 !important;
            color: #000 !important;
            font-size: 14px;
        }

        button.add {
            background-color: #888888 !important;
            color: #000 !important;
        }

        button.delete {
            background-color: #888888 !important;
            color: #000 !important;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(100, 100, 120, 0.5);
            text-align: right;
            font-size: 14px;
        }

        tr:hover {
            background-color: rgba(100, 100, 150, 0.2);
        }

        .error {
            color: #f87171;
            margin-bottom: 10px;
        }

        .top-left-btn {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 1000;
            padding: 10px 18px;
            border-radius: 10px;
            background-color: #888888;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .top-left-btn:hover {
            background-color: #aaaaaa;
        }

        .top-right-btn {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 1000;
            padding: 10px 18px;
            border-radius: 10px;
            background-color: #888888;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .top-right-btn:hover {
            background-color: #aaaaaa;
        }
    </style>
</head>

<body class="bg-black">
    <div class="bg-black px-4 py-8 text-center">
        <h1 class="text-gray-400 text-4xl font-bold">Call Center</h1>
    </div>
    <a href="http://localhost:8000/appointment" class="top-left-btn">
        حجز موعد
    </a>
    <button onclick="logout()" class="top-right-btn">
        تسجيل الخروج
    </button>
    <div>
        <div class="w-full max-w-2xl">
            <div class="grid grid-cols-3 gap-6">
            </div>
        </div>
        <div class="form-section">
            <div>
                <input id="currentPhoneSearchInput" placeholder="ابحث برقم الهاتف">
            </div>
        </div>

        <div class="table-section">
            <h2>قائمة العملاء الحاليين</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>اسم العميل</th>
                        <th>رقم الهاتف</th>
                        <th>نوع السيارة</th>
                        <th>الموديل</th>
                        <th>اللون</th>
                        <th>العداد</th>
                        <th>رقم اللوحة المعدنية</th>
                    </tr>
                </thead>
                <tbody id="call_center"></tbody>
            </table>
        </div>
    </div>

    <div>
        <div class="w-full max-w-2xl">
            <div class="grid grid-cols-3 gap-6">
            </div>
        </div>
        <div class="form-section">
            <div>
                <input id="futurePhoneSearchInput" placeholder="ابحث برقم الهاتف">
            </div>
        </div>

        <div class="table-section">
            <h2>قائمة العملاء المستقبليين</h2>
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>اسم العميل</th>
                        <th>رقم الهاتف</th>

                    </tr>
                </thead>
                <tbody id="future_customers"></tbody>
            </table>
        </div>
    </div>
    <script>

        let all_customer = [];

        async function loadcustomers() {
            const tbody = document.getElementById("call_center");
            tbody.innerHTML = "";
            const res = await fetch("http://localhost:8000/customers/get_current_customers", { credentials: "include" });
            all_customer = await res.json();
            render_customer(all_customer);
        }

        function render_customer(customers) {
            const tbody = document.getElementById("call_center");
            tbody.innerHTML = "";

            customers.forEach(customer => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td>${customer.id}</td>
            <td>${customer.name || "-"}</td>
            <td>${customer.phone_number || "-"}</td>
            <td>${customer.brand}</td>
            <td>${customer.model}</td>
            <td>${customer.color || "-"}</td>
            <td>${customer.mileage || "-"}</td>
            <td>${customer.plate_number || "-"}</td>
            <td>${customer.source || "-"}</td>
            <td>
            </td>
        `;
                tbody.appendChild(tr);

            });
        }

        function applyCurrentSearch() {
            const phoneQuery = document.getElementById("currentPhoneSearchInput").value.toLowerCase();

            render_customer(
                all_customer.filter(c =>
                    (c.phone_number || "").toLowerCase().includes(phoneQuery)
                )
            );
        }

        document.getElementById("currentPhoneSearchInput").addEventListener("input", applyCurrentSearch);
        loadcustomers();

        let future_customers = [];

        async function load_future_customers() {
            const tbody = document.getElementById("future_customers");
            tbody.innerHTML = "";
            const res = await fetch("http://localhost:8000/customers/get_future_customers", { credentials: "include" });
            future_customers = await res.json();
            render_future_customers(future_customers);
        }

        function render_future_customers(customers) {
            const tbody = document.getElementById("future_customers");
            tbody.innerHTML = "";

            customers.forEach(customer => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td>${customer.id}</td>
            <td>${customer.name || "-"}</td>
            <td>${customer.phone_number || "-"}</td>
        `;
                tbody.appendChild(tr);

            });
        }

        function applyFutureSearch() {
            const phoneQuery = document.getElementById("futurePhoneSearchInput").value.toLowerCase();

            render_future_customers(
                future_customers.filter(c =>
                    c.phone_number.toLowerCase().includes(phoneQuery)
                )
            );
        }
        document.getElementById("futurePhoneSearchInput").addEventListener("input", applyFutureSearch);
        load_future_customers();

        async function logout() {
            try {
                await fetch("http://localhost:8000/logout", {
                    method: "POST",
                    credentials: "include"
                });

                window.location.href = "http://localhost:8000";
            } catch (e) {
                alert("Logout failed");
            }
        }

    </script>
