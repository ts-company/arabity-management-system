<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>صفحة المندوب</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            font-size: 16px;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header a {
            color: #ffffff;
            text-decoration: none;
        }

        header a:hover {
            color: #fff;
        }

        .form-section,
        .table-section {
            background-color: #000000;
            border: 2px solid rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .form-section h2,
        .table-section h2 {
            font-size: 22px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            background: #444444;
            color: #ffffff;
            font-size: 15px;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background-color: #888888 !important;
            color: #000 !important;
            font-size: 14px;
        }

        button.add {
            background-color: #888888 !important;
            color: #000 !important;
        }

        button.delete {
            background-color: #888888 !important;
            color: #000 !important;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(100, 100, 120, 0.5);
            text-align: right;
            font-size: 14px;
        }

        tr:hover {
            background-color: rgba(100, 100, 150, 0.2);
        }

        .error {
            color: #f87171;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="bg-black px-4 py-8 text-center">
        <h1 class="text-gray-400 text-4xl font-bold">representative</h1>
    </div>
    <div>
    </div>
    <div>
        <div class="w-full max-w-2xl">
            <div class="grid grid-cols-3 gap-6">
            </div>
        </div>
        <div class="table-section">
            <h2>قائمة قطع الغيار</h2>
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>نوع السيارة</th>
                        <th>الموديل</th>
                        <th>اللون</th>
                        <th>رقم الشاسيه</th>
                        <th>عداد السيارة</th>
                        <th>البند</th>
                        <th>الوصف</th>
                        <th>رسالة</th>
                        <th>حفظ</th>


                    </tr>
                </thead>
                <tbody id="spare_parts"></tbody>
            </table>
        </div>
    </div>
    </div>

    <script>


        let spare_parts = [];

        async function load_spare_parts() {
            const tbody = document.getElementById("spare_parts");
            tbody.innerHTML = "";
            const res = await fetch("http://localhost:8000/cars/get_cars", { credentials: "include" });
            spare_parts = await res.json();
            render_spare_parts(spare_parts);
        }

        function render_spare_parts(parts) {
            const tbody = document.getElementById("spare_parts");
            tbody.innerHTML = "";

            parts.forEach(part => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td>${part.id}</td>
            <td>${part.car_type || "-"}</td>
            <td>${part.model || "-"}</td>
            <td>${part.color || "-"}</td>
            <td>${part.chassis_number || "-"}</td>
            <td>${part.mileage || "-"}</td>
            <td>${part.item || "-"}</td>
            <td>${part.description || "-"}</td>

            <td>
                <input 
                    type="text"
                    value="${part.message || ""}"
                    placeholder="اكتب رسالة"
                    oninput="part.message = this.value"
                />
            </td>

            <td>
                <button onclick="save(${part.id})">حفظ</button>
            </td>
        `;
                tbody.appendChild(tr);
            });
        }

        async function save(id) {

            const res = await fetch(`http://localhost:8000/cars/delete_car/${id}`, {
                method: "PATCH",
                credentials: "include"
            });
            load_spare_parts();
        }

        load_spare_parts();
    </script>

</body>
