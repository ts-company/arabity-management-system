    <style>
        body {
            background-color: #000000;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 20px;
        }

        header {
            margin-bottom: 20px;
        }

        /* Sections */
        .form-section,
        .table-section {
            background-color: #000000;
            border: 1px solid #333333;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        /* Form grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        /* Inputs and selects */
        input,
        select {
            padding: 6px 8px;
            border-radius: 8px;
            border: none;
            background-color: #000000;
            color: #ffffff;
        }

        input:focus,
        select:focus {
            outline: none;
            box-shadow: none;
        }

        /* Buttons */
        button,
        button.add,
        button.delete {
            padding: 6px 8px;
            border-radius: 8px;
            border: none;
            background-color: #444444;
            color: #ffffff;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #555555;
        }

        /* Tables with gold accent line on the left */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #000000;
            position: relative;
            /* for pseudo-element */
        }

        /* Gold line on the left */
        table::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            /* thickness of gold line */
            height: 100%;
            background-color: gold;
            border-radius: 2px;
        }

        /* Cells */
        th,
        td {
            padding: 6px;
            text-align: right;
            border: none;
            /* remove row separators */
        }

        /* Row hover */
        tr:hover {
            background-color: #2a2a2a;
        }

        /* Error messages */
        .error {
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        /* Inline edit row */
        .edit-row {
            display: none;
            gap: 6px;
            flex-wrap: wrap;
        }
    </style>
</head>
